# Cyber Gallery — nginx site
# Replace API_DOMAIN and WEB_DOMAIN before installing.
# After copying to /etc/nginx/sites-available/cyber-gallery, run:
#   sudo ln -s /etc/nginx/sites-available/cyber-gallery /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d API_DOMAIN -d WEB_DOMAIN

# ----- API -----
server {
    listen 80;
    listen [::]:80;
    server_name API_DOMAIN;

    # Allow large image uploads (max image size = 50 MB; add a little headroom).
    client_max_body_size 60M;

    # Long timeouts for big uploads on slow mobile networks.
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    send_timeout 300s;

    location / {
        proxy_pass http://127.0.0.1:4817;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_buffering off;
        proxy_request_buffering off;
    }
}

# ----- Web portal -----
server {
    listen 80;
    listen [::]:80;
    server_name WEB_DOMAIN;

    # Web also proxies /api/* to the API host. Keep large bodies allowed.
    client_max_body_size 60M;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}
