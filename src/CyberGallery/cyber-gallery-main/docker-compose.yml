services:
  postgres:
    image: postgres:16-alpine
    container_name: cg-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cg
      POSTGRES_PASSWORD: cg
      POSTGRES_DB: cyber_gallery
    ports:
      - "5434:5432"
    volumes:
      - cg-pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: cg-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - cg-redis:/data

volumes:
  cg-pg:
  cg-redis:
